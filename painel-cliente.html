<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leads B2B — Painel do Cliente</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f8f7f4;
  --surface: #ffffff;
  --border: #e8e6e0;
  --border2: #d4d0c8;
  --text: #1a1917;
  --muted: #8a8680;
  --accent: #2563eb;
  --accent-bg: #eff6ff;
  --green: #16a34a;
  --green-bg: #f0fdf4;
  --amber: #d97706;
  --amber-bg: #fffbeb;
  --red: #dc2626;
  --red-bg: #fef2f2;
  --purple: #7c3aed;
  --purple-bg: #f5f3ff;
  --teal: #0d9488;
  --teal-bg: #f0fdfa;
  --font: 'Plus Jakarta Sans', sans-serif;
  --mono: 'JetBrains Mono', monospace;
  --radius: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }

/* Top bar */
.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.brand { display: flex; align-items: center; gap: 10px; }
.brand-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); }
.brand-name { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; }
.brand-name span { color: var(--accent); }
.topbar-meta { font-size: 12px; color: var(--muted); font-family: var(--mono); }

/* Layout */
.layout { display: flex; min-height: calc(100vh - 53px); }

/* Sidebar */
.sidebar {
  width: 240px;
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 20px 0;
  position: sticky;
  top: 53px;
  height: calc(100vh - 53px);
  overflow-y: auto;
}
.sidebar-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 0 20px;
  margin-bottom: 8px;
}
.filter-btn {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 9px 20px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  color: var(--muted);
  border: none;
  background: none;
  width: 100%;
  text-align: left;
  transition: all 0.15s;
  border-radius: 0;
}
.filter-btn:hover { background: var(--bg); color: var(--text); }
.filter-btn.active { color: var(--accent); background: var(--accent-bg); font-weight: 600; }
.filter-btn.active .filter-dot { background: var(--accent); }
.filter-count {
  font-family: var(--mono);
  font-size: 11px;
  background: var(--border);
  border-radius: 20px;
  padding: 1px 7px;
  font-weight: 400;
}
.filter-btn.active .filter-count { background: rgba(37,99,235,0.15); color: var(--accent); }

.grupo-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-right: 8px;
}

.sidebar-divider { height: 1px; background: var(--border); margin: 16px 0; }
.sidebar-label-row { display: flex; align-items: center; gap: 8px; }

/* Main */
.main { flex: 1; padding: 24px 28px; min-width: 0; }

/* Search + stats */
.top-row {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.search-wrap {
  flex: 1;
  position: relative;
  min-width: 200px;
}
.search-wrap svg {
  position: absolute;
  left: 13px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
}
.search-input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 14px 10px 38px;
  font-family: var(--font);
  font-size: 14px;
  color: var(--text);
  outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--muted); }

.stats-chips { display: flex; gap: 8px; flex-wrap: wrap; }
.chip {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 14px;
  font-size: 12px;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 6px;
}
.chip-num { font-weight: 700; font-size: 14px; color: var(--accent); font-family: var(--mono); }

/* Cards grid */
.result-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}
.result-count { font-size: 13px; color: var(--muted); }
.result-count strong { color: var(--text); font-weight: 600; }

.btn-export {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--text);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 8px 16px;
  font-family: var(--font);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.15s;
}
.btn-export:hover { opacity: 0.85; }

.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 14px;
}

.lead-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  transition: border-color 0.15s, box-shadow 0.15s;
  cursor: default;
}
.lead-card:hover {
  border-color: var(--border2);
  box-shadow: 0 4px 16px rgba(0,0,0,0.06);
}

.card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; gap: 8px; }
.card-empresa { font-size: 14px; font-weight: 600; line-height: 1.35; flex: 1; }
.grupo-badge {
  font-size: 10px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 20px;
  white-space: nowrap;
  flex-shrink: 0;
}

.card-fields { display: flex; flex-direction: column; gap: 7px; }
.card-field { display: flex; align-items: flex-start; gap: 8px; font-size: 13px; }
.field-icon { width: 16px; flex-shrink: 0; margin-top: 1px; color: var(--muted); }
.field-label { font-size: 10px; color: var(--muted); font-family: var(--mono); margin-bottom: 1px; }
.field-val { color: var(--text); line-height: 1.35; }
.field-val.mono { font-family: var(--mono); font-size: 12px; }
.field-val.empty { color: var(--muted); font-style: italic; font-size: 12px; }

.card-footer {
  margin-top: 14px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.mei-badge {
  font-size: 10px;
  font-weight: 700;
  font-family: var(--mono);
  padding: 2px 8px;
  border-radius: 4px;
  background: var(--amber-bg);
  color: var(--amber);
  border: 1px solid #fde68a;
}
.me-badge {
  font-size: 10px;
  font-weight: 700;
  font-family: var(--mono);
  padding: 2px 8px;
  border-radius: 4px;
  background: var(--accent-bg);
  color: var(--accent);
  border: 1px solid #bfdbfe;
}
.card-cnpj { font-family: var(--mono); font-size: 10px; color: var(--muted); }
.card-abertura { font-family: var(--mono); font-size: 10px; color: var(--muted); }

/* WhatsApp button */
.btn-wpp {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: #25d366;
  color: #fff;
  border: none;
  border-radius: 6px;
  padding: 5px 10px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  text-decoration: none;
  transition: opacity 0.15s;
}
.btn-wpp:hover { opacity: 0.85; }

/* Empty */
.empty { text-align: center; padding: 80px 20px; color: var(--muted); }
.empty-icon { font-size: 36px; margin-bottom: 12px; }
.empty h3 { font-size: 16px; color: var(--text); margin-bottom: 6px; font-weight: 600; }
.empty p { font-size: 13px; }

/* Responsive */
@media (max-width: 700px) {
  .sidebar { display: none; }
  .main { padding: 16px; }
  .topbar { padding: 12px 16px; }
}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="brand-dot"></div>
    <div class="brand-name">Lead<span>Hub</span></div>
  </div>
  <div class="topbar-meta" id="topMeta">100 empresas · atualizado hoje</div>
</div>

<div class="layout">

  <aside class="sidebar">

      </span>
      <span class="filter-count" id="cnt-Alimentação">—</span>

    <button class="filter-btn" onclick="setGrupo('Construção & Reformas')" id="btn-Construção & Reformas">
      <span style="display:flex;align-items:center;gap:8px">

      <span class="filter-count" id="cnt-Outros Serviços">—</span>
    </button>

    <div class="sidebar-divider"></div>
    <div class="sidebar-label">Tipo</div>
    <button class="filter-btn" onclick="setTipo('todos')" id="tipo-todos" style="color:var(--text)">
      <span style="display:flex;align-items:center;gap:8px">Todos os tipos</span>
      <span class="filter-count"></span>
    </button>
    <button class="filter-btn" onclick="setTipo('MEI')" id="tipo-MEI">
      <span>MEI</span>
    </button>
    <button class="filter-btn" onclick="setTipo('ME')" id="tipo-ME">
      <span>ME</span>
    </button>

    <div class="sidebar-divider"></div>
    <div class="sidebar-label">Contato</div>
    <button class="filter-btn" onclick="setContato('todos')" id="contato-todos" style="color:var(--text)">
      <span>Todos</span>
    </button>
    <button class="filter-btn" onclick="setContato('comTel')" id="contato-comTel">
      <span>Com telefone</span>
    </button>
    <button class="filter-btn" onclick="setContato('comEmail')" id="contato-comEmail">
      <span>Com email</span>
    </button>
  </aside>

  <!-- Main content -->
  <main class="main">

    <div class="top-row">
      <div class="search-wrap">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input class="search-input" type="text" id="searchInput" placeholder="Buscar empresa, sócio, cidade..." oninput="render()">
      </div>
      <div class="stats-chips">
        <div class="chip"><span class="chip-num" id="chipTotal">100</span> empresas</div>
        <div class="chip"><span class="chip-num" id="chipTel">—</span> com tel.</div>
        <div class="chip"><span class="chip-num" id="chipEmail">—</span> com email</div>
      </div>
    </div>

    <div class="result-header">
      <div class="result-count"><strong id="resultCount">100</strong> resultados</div>
      <button class="btn-export" onclick="exportarXLSX()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Exportar lista

    </div>

    <div class="cards-grid" id="cardsGrid"></div>
    <div class="empty" id="emptyState" style="display:none">
      <div class="empty-icon">🔍</div>
      <h3>Nenhum resultado</h3>
      <p>Tente ajustar os filtros ou a busca.</p>
    </div>
  </main>
</div>

const GRUPO_COLORS = {
  'Alimentação':          { bg:'#fff7ed', color:'#c2410c', dot:'#f97316' },
  'Construção & Reformas':{ bg:'#fffbeb', color:'#b45309', dot:'#d97706' },

  'Outros Serviços':      { bg:'#f9fafb', color:'#374151', dot:'#6b7280' },
  'Beleza & Estética':    { bg:'#fdf4ff', color:'#86198f', dot:'#c026d3' },
};

let grupoAtivo = 'todos';
let tipoAtivo  = 'todos';
let contatoAtivo = 'todos';

function fmtWpp(tel) {
  if (!tel) return null;
  const d = tel.replace(/\D/g,'');
  if (d.length < 10) return null;
  return '55' + d;
}

function getFiltered() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  return LEADS.filter(l => {
    if (grupoAtivo !== 'todos' && l.grupo !== grupoAtivo) return false;
    if (tipoAtivo  !== 'todos' && l.mei  !== tipoAtivo)  return false;
    if (contatoAtivo === 'comTel'   && !l.telefone) return false;
    if (contatoAtivo === 'comEmail' && !l.email)    return false;
    if (q) {
      const hay = (l.empresa+l.socio+l.cidade+l.uf+l.cnae+l.cnpj).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

function setGrupo(g) {
  grupoAtivo = g;
  document.querySelectorAll('[id^="btn-"]').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + g)?.classList.add('active');
  render();
}

function setTipo(t) {
  tipoAtivo = t;
  document.querySelectorAll('[id^="tipo-"]').forEach(b => b.classList.remove('active'));
  document.getElementById('tipo-' + t)?.classList.add('active');
  render();
}

function setContato(c) {
  contatoAtivo = c;
  document.querySelectorAll('[id^="contato-"]').forEach(b => b.classList.remove('active'));
  document.getElementById('contato-' + c)?.classList.add('active');
  render();
}

function updateSidebarCounts() {
  const groups = ['Alimentação','Construção & Reformas','Elétrica & Climatização','Comércio','Outros Serviços'];
  groups.forEach(g => {
    const cnt = LEADS.filter(l => l.grupo === g).length;
    const el = document.getElementById('cnt-' + g);
    if (el) el.textContent = cnt;
  });
  document.getElementById('cnt-todos').textContent = LEADS.length;
}

function render() {
  const filtered = getFiltered();

  const empty = document.getElementById('emptyState');

  document.getElementById('resultCount').textContent = filtered.length;
  document.getElementById('chipTotal').textContent   = filtered.length;
  document.getElementById('chipTel').textContent     = filtered.filter(l=>l.telefone).length;
  document.getElementById('chipEmail').textContent   = filtered.filter(l=>l.email).length;

  if (filtered.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  grid.innerHTML = filtered.map(l => {

          </div>

                WhatsApp
              </a>` : ''}
            </div>
          </div>
        </div>
        <div class="card-field">
          <div class="field-icon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          </div>
          <div>
            <div class="field-label">Email</div>
            <div class="field-val" style="font-size:12px;word-break:break-all">${email ? esc(email) : '<span class=\'field-val empty\'>não informado</span>'}</div>
          </div>
        </div>
        <div class="card-field">
          <div class="field-icon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>

          <div>

            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-4 0v2"/><line x1="12" y1="12" x2="12" y2="16"/></svg>
          </div>
          <div>
            <div class="field-label">Atividade</div>
            <div class="field-val" style="font-size:12px;color:var(--muted)">${esc(l.cnae)}</div>
          </div>
        </div>
      </div>
      <div class="card-footer">
        <span class="${badgeClass}">${esc(l.mei)}</span>
        <span class="card-abertura">Abertura: ${esc(l.abertura)}</span>
        <span class="card-cnpj">${esc(fmtCNPJ(l.cnpj))}</span>
      </div>
    </div>`;
  }).join('');
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtCNPJ(c) {
  if (!c) return '';
  const d = c.replace(/\D/g,'');
  if (d.length===14) return d.replace(/(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/,'$1.$2.$3/$4-$5');
  return c;
}

function exportarXLSX() {
  const filtered = getFiltered();
  const headers = ['Empresa','Sócio / Responsável','Telefone','Email','Cidade','UF','Segmento','Tipo','CNAE','CNPJ','Abertura','Situação'];
  const rows = filtered.map(l => [
    l.empresa, l.socio, l.telefone, l.email,
    l.cidade, l.uf, l.grupo, l.mei, l.cnae,
    fmtCNPJ(l.cnpj), l.abertura, l.situacao
  ]);
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);
  ws['!cols'] = [{wch:30},{wch:28},{wch:18},{wch:32},{wch:20},{wch:6},{wch:22},{wch:6},{wch:50},{wch:22},{wch:12},{wch:10}];
  XLSX.utils.book_append_sheet(wb, ws, 'Leads');
  XLSX.writeFile(wb, 'leads_' + new Date().toISOString().slice(0,10) + '.xlsx');
}
